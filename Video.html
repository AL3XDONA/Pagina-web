<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html": charset="UTF-8">
    <title>Video</title>

    <style>
            img {
                display: block;
                margin: auto;
            }
            body {
                background-color: white;
                margin: 0;
            }
            h1 {
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                color: white;
                text-align: center;            
            }
            p {
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                font-size: 20px;
            }
            button {
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                font-size: 20px;
                background-color: #4CAF50;
                border: none;
                padding: 20px;
            }
            ul, ol {
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                font-size: 18px;
            }
             .cabecera {
                background-color: black;
                padding: 0px;
                margin-bottom: 0px;
            }
            .cabecera img {
                width: 100px;
                max-width: 1200px;
                min-width: 700px;
            }
            .titulo {
                overflow: hidden;
                float: left;
                min-width: 450px;
                background-color: black;
                width: 45%;
                border: 10px solid darkgray;
                padding: 5px;
                margin: 5px;
            }
            .titulo img {
                min-width: 300;
                width: 78px;
                padding: 15px;
            }
            .titulo p {
                min-width: 200px;
                width: 100%;
                color: white;
            }
            .titulo h1{
                float: right;
                width: 100%;
                color: coral;
                font-size: 24px;
            }
            .menu {
                list-style-type: none;
                margin: 0;
                padding: 0;
                overflow: hidden;
                background-color: #333;
            }
            .menu li{
                float: left;
            }
            .menu li a{
                display: block;
                color: white;
                padding: 14px 16px;
                text-decoration: none;
            }
            .menu li a:hover:not(.active) {
                background-color: gray;
            }
            .active {
                background-color: #4CAF50;
            }
            .video {
                position: relative;
                padding-bottom: 56.25%;
                padding-top: 30px;
                height: 0;
                overflow: hidden;
            }
            .video iframe {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }
    </style>

</head>
<body>
    <div class="cabecera">
        <img src="../Img/Comida.png" alt="Huarache">
    </div>

    <div>
        <ul class="menu">
            <li><a class="active" href="home">Inicio</a></li>
            <li><a href="products" target="_blank">Productos</a></li>
            <li><a href="contact" target="_blank">Contacto</a></li>
            <li><a href="about" target="_blank">Acerca de</a></li>
        </ul>
    </div>

    <div class="titulo">
        <div class="video"> 
            <iframe src="https://www.youtube.com/embed/TKPWmnqNcNs" frameborder="0" allowfullscreen="allowfullscreen"></iframe>
        </div>
        <p> HUARACHES GIGANTES del mercado de JAMAICA </p>
    </div>

    <div class="titulo">
        <div class="video"> 
            <iframe src="https://www.youtube.com/embed/mPLhEI-PfA0&t=2s" frameborder="0" allowfullscreen="allowfullscreen"></iframe>
        </div>
        <p> Se te hará agua la boca con estos huaraches gigantes | Cocineros mexicanos </p>

</body>
</html>
