<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inicio - Huaraches Los Osos</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* SLIDER */
.slider {
    position: relative;
    width: 100%;
    height: 850px;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1s ease;
}

.slide.active {
    opacity: 1;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXTO */
.texto {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    text-shadow: 2px 2px 5px black;
}

.texto h2 {
    font-size: 40px;
}

.texto p {
    font-size: 20px;
}

/* BOTÓN */
.btn {
    background: #E07B39;
    padding: 12px 25px;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    display: inline-block;
    margin-top: 10px;
}

/* FLECHAS */
.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

</style>
</head>

<body>


<!-- SLIDER -->
<div class="slider">

    <div class="slide active">
        <img src="../Img/Osos.png">
        <div class="texto">
            <h2>Tradición Mexicana</h2>
            <p>Sabor auténtico en cada bocado</p>
            <a href="Formulario.html" class="btn">Ordenar ahora</a>
        </div>
    </div>

    <div class="slide">
        <img src="../Img/Negocio1.png">
        <div class="texto">
            <h2>Ambiente Familiar</h2>
            <p>Disfruta con quienes más quieres</p>
            <a href="Formulario.html" class="btn">Realiza tu pedido</a>
        </div>
    </div>

    <div class="slide">
        <img src="../Img/Comida1.png">
        <div class="texto">
            <h2>Calidad y Sabor</h2>
            <p>Ingredientes frescos siempre</p>
            <a href="Formulario.html" class="btn">Hacer pedido</a>
        </div>
    </div>

    <button class="prev" onclick="mover(-1)">❮</button>
    <button class="next" onclick="mover(1)">❯</button>

</div>

<script>
let index = 0;
let slides = document.querySelectorAll(".slide");

function mostrar(i) {
    slides.forEach(s => s.classList.remove("active"));
    slides[i].classList.add("active");
}

function mover(direccion) {
    index += direccion;

    if (index < 0) index = slides.length - 1;
    if (index >= slides.length) index = 0;

    mostrar(index);
}

// CAMBIO AUTOMÁTICO
setInterval(() => {
    mover(1);
}, 4000);
</script>

</body>
</html>
